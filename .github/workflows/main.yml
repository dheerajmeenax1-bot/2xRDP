name: DEVXRDP – RDP + Tailscale (10 Hours)

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: "Tailscale Auth Key (tskey-auth-XXXX)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: devxrdp-single-session
  cancel-in-progress: false

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 650

    env:
      RDP_USER: DEVXRDP
      RDP_PASS: Rdp!9Xq#2025
      TS_HOSTNAME: DEVXRDP

    steps:

      - name: Install and start Tailscale
        run: |
          $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"

          if (-not (Test-Path $exe)) {
            Invoke-WebRequest `
              -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" `
              -OutFile "$env:TEMP\tailscale.msi"

            Start-Process msiexec.exe -Wait `
              -ArgumentList "/i","$env:TEMP\tailscale.msi","/quiet","/norestart"
          }

          & $exe logout | Out-Null
          & $exe up `
            --authkey "${{ inputs.ts_authkey }}" `
            --hostname "$env:TS_HOSTNAME" `
            --accept-dns=false `
            --reset

      - name: Show Tailscale IP (DEVXRDP)
        run: |
          $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $ip = & $exe ip -4 | Select-Object -First 1

          Write-Host ""
          Write-Host "================================="
          Write-Host " RDP NAME : DEVXRDP"
          Write-Host " RDP IP   : $ip"
          Write-Host " USER     : DEVXRDP"
          Write-Host " PASS     : Rdp!9Xq#2025"
          Write-Host "================================="

      - name: Enable RDP
        run: |
          $sec = ConvertTo-SecureString $env:RDP_PASS -AsPlainText -Force

          if (-not (Get-LocalUser -Name $env:RDP_USER -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $env:RDP_USER -Password $sec -AccountNeverExpires
            Add-LocalGroupMember Administrators $env:RDP_USER
            Add-LocalGroupMember "Remote Desktop Users" $env:RDP_USER
          } else {
            Set-LocalUser -Name $env:RDP_USER -Password $sec
            Enable-LocalUser $env:RDP_USER
          }

          Set-ItemProperty `
            "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name fDenyTSConnections `
            -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Disable RDP Idle & Session Timeouts
        run: |
          $rdpPath = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp"

          # 0 = No timeout (never disconnect)
          Set-ItemProperty -Path $rdpPath -Name "MaxIdleTime"          -Value 0
          Set-ItemProperty -Path $rdpPath -Name "MaxConnectionTime"    -Value 0
          Set-ItemProperty -Path $rdpPath -Name "MaxDisconnectionTime" -Value 0
          Set-ItemProperty -Path $rdpPath -Name "fResetBroken"         -Value 0

          # Group Policy overrides via registry
          $gpPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          if (-not (Test-Path $gpPath)) { New-Item -Path $gpPath -Force | Out-Null }

          Set-ItemProperty -Path $gpPath -Name "MaxIdleTime"          -Value 0
          Set-ItemProperty -Path $gpPath -Name "MaxConnectionTime"    -Value 0
          Set-ItemProperty -Path $gpPath -Name "MaxDisconnectionTime" -Value 0
          Set-ItemProperty -Path $gpPath -Name "fResetBroken"         -Value 0
          Set-ItemProperty -Path $gpPath -Name "fDisableCam"          -Value 0

          Write-Host "RDP timeouts disabled successfully."

      - name: Disable Screen Saver & Sleep
        run: |
          # Disable screen saver
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "ScreenSaveActive" -Value "0"
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "ScreenSaverIsSecure" -Value "0"

          # Disable sleep/hibernate
          powercfg /change standby-timeout-ac 0
          powercfg /change hibernate-timeout-ac 0
          powercfg /change monitor-timeout-ac 0

          Write-Host "Sleep and screen saver disabled."

      - name: KEEP ALIVE (10 HOURS CONTINUOUS)
        run: |
          $end = (Get-Date).AddHours(10)
          Write-Host "Session will run until: $end"

          $wsh = New-Object -ComObject WScript.Shell

          while ((Get-Date) -lt $end) {
            $remaining = $end - (Get-Date)
            Write-Host "Remaining: $([math]::Round($remaining.TotalMinutes, 1)) minutes"

            # Simulate small activity to prevent idle disconnect
            $wsh.SendKeys("{SCROLLLOCK}")
            Start-Sleep -Milliseconds 100
            $wsh.SendKeys("{SCROLLLOCK}")

            Start-Sleep -Seconds 60
          }

      - name: Finished
        run: echo "DEVXRDP session ended after 10 hours"
